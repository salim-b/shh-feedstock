context:
  version: "2026.3.8"

package:
  name: shh
  version: ${{ version }}

source:
  url: https://github.com/desbma/shh/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2d294e583ccc742095cc211080fb1c4c8b095dd4b30b98d116d36acbb4b5e1b6

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - cargo auditable install --locked --no-track --bins --features=generate-extras --root="$PREFIX" --path .
      # generate manpage and shell completions
      - mkdir -p "$PREFIX"/share/man/man1 "$PREFIX"/share/bash-completion/completions "$PREFIX"/share/fish/vendor_completions.d "$PREFIX"/share/zsh/site-functions
      - '"$PREFIX"/bin/shh gen-man-pages                        "$PREFIX"/share/man/man1'
      - '"$PREFIX"/bin/shh gen-shell-completions --shell=bash > "$PREFIX"/share/bash-completion/completions/shh'
      - '"$PREFIX"/bin/shh gen-shell-completions --shell=fish > "$PREFIX"/share/fish/vendor_completions.d/shh.fish'
      - '"$PREFIX"/bin/shh gen-shell-completions --shell=zsh  > "$PREFIX"/share/zsh/site-functions/_shh'
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  skip:
    - osx
    - win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses
  host:
    - strace

tests:
  - script:
    - shh --help
    - shh --version
    requirements:
      run:
        - strace
  - package_contents:
      bin:
        - shh
      files:
        - share/man/man1/shh.1
        - share/man/man1/shh-gen-man-pages.1
        - share/man/man1/shh-gen-shell-completions.1
        - share/man/man1/shh-list-systemd-options.1
        - share/man/man1/shh-merge-profile-data.1
        - share/man/man1/shh-run.1
        - share/man/man1/shh-service.1
        - share/man/man1/shh-service-finish-profile.1
        - share/man/man1/shh-service-reset.1
        - share/man/man1/shh-service-start-profile.1
        - share/bash-completion/completions/shh
        - share/fish/vendor_completions.d/shh.fish
        - share/zsh/site-functions/_shh
      strict: true

about:
  homepage: https://github.com/desbma/shh
  summary: Automatic systemd service hardening guided by strace profiling
  description: |
    Systemd Hardening Helper (SHH) can generate an optimal set of hardening
    options for systemd services. It profiles service behavior using strace and
    automatically generates appropriate systemd security options, enabling
    security hardening without breaking services due to overly restrictive
    sandboxing.
  license: GPL-3.0-only
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/desbma/shh

extra:
  recipe-maintainers:
    - salim-b
